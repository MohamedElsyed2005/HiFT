META_ARC: "HiFT_alexnet_aic4"
CUDA: True
# ======================================================================
# AIC-4 Fine-Tuning Config (FIXED)
#
# KEY CHANGES FROM ORIGINAL:
#
# 1. DATASET.AIC4.NUM_USE: -1
#    Original was 100000 with only ~202 train sequences → each sequence
#    repeated ~495 times per epoch → model memorised training set in
#    epoch 1 → validation collapsed.
#    Setting -1 uses all available pairs exactly once (or twice via shuffle).
#    Combined with VIDEOS_PER_EPOCH: 4000 this gives ~20 views/seq/epoch.
#
# 2. VIDEOS_PER_EPOCH: 4000
#    Controls epoch length. 4000 pairs ≈ 20 epochs to see full dataset once.
#    Keeps each epoch short enough for frequent checkpointing.
#
# 3. SEARCH.BLUR: 0.2, SEARCH.FLIP: 0.2
#    Pretrained model saw heavy augmentation. Without blur/flip on the small
#    AIC-4 dataset the model overfits within 2 epochs.
#
# 4. LOC_WEIGHT: 1.0 (train.py get_loc_weight start now = 0.1, ramp full duration)
#    Starting regression loss too high destabilises early training when
#    classification head hasn't yet found the target region.
#
# 5. BASE_LR: 0.00005 (unchanged — correct for fine-tuning on small dataset)
#
# 6. OUTPUT_SIZE: 11 (unchanged — architecturally correct)
# ======================================================================

TRAIN:
  THR_HIGH: 0.6
  THR_LOW: 0.3
  NEG_NUM: 16
  POS_NUM: 16
  TOTAL_NUM: 64
  CLS_WEIGHT: 1.0
  LOC_WEIGHT: 1.5        # final target; train.py ramps from 0.1 over full training
  SHAPE_WEIGHT: 2.0
  EXEMPLAR_SIZE: 127
  SEARCH_SIZE: 287
  OUTPUT_SIZE: 11        # MUST be 11 for SEARCH_SIZE=287 with AlexNet backbone
  OUTPUTFEATURE_SIZE: 11 # must equal OUTPUT_SIZE
  LABEL_RANGE: 4
  BASE_SIZE: 8
  RESUME: ''
  PRETRAINED: 1
  LARGER: 2.0
  LOG_DIR: './logs'
  SNAPSHOT_DIR: './snapshot'
  EPOCH: 20
  START_EPOCH: 0
  BATCH_SIZE: 4
  NUM_GPU: 1
  NUM_WORKERS: 2
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.0001
  BASE_LR: 0.00005
  LR:
    TYPE: 'log'
    KWARGS:
      start_lr: 0.00005
      end_lr: 0.000001
  LR_WARMUP:
    WARMUP: True
    TYPE: 'step'
    EPOCH: 3
  PRINT_FREQ: 20
  GRAD_CLIP: 10.0
  w1: 1.0
  w2: 1.0
  w3: 1.0
  w4: 1.0
  w5: 1.0
  range: 2.0
  MASK_WEIGHT: 1
  LOG_GRADS: True
  clsandlocchannel: 256
  groupchannel: 32
  PR: 1

DATASET:
  NAMES: ['AIC4']
  NEG: 0.2
  GRAY: 0.0
  VIDEOS_PER_EPOCH: 4000   # FIXED: was 20000 — too large for 202 sequences
  TEMPLATE:
    SHIFT: 4
    SCALE: 0.05
    BLUR: 0.0
    FLIP: 0.0
    COLOR: 1.0
  SEARCH:
    SHIFT: 32
    SCALE: 0.15
    BLUR: 0.2    # FIXED: was 0.0 — enable blur augmentation
    FLIP: 0.2    # FIXED: was 0.0 — enable horizontal flip
    COLOR: 1.0
  AIC4:
    ROOT: 'data/processed/crop511'
    ANNO: 'data/processed/train.json'   # FIXED: points to crop annotation JSON
    FRAME_RANGE: 50
    NUM_USE: -1  # FIXED: was 100000 — use all available pairs (no repetition)

BACKBONE:
  TYPE: 'alexnet'
  PRETRAINED: 'pretrained/first.pth'
  TRAIN_LAYERS: ['layer4', 'layer5']   # freeze layers 1-3, fine-tune 4-5
  LAYERS_LR: 0.1
  TRAIN_EPOCH: 10

ANCHOR:
  STRIDE: 16

TRACK:
  TYPE: 'HiFTtracker'
  PENALTY_K: 0.04
  WINDOW_INFLUENCE: 0.44
  LR: 0.33
  w1: 1.2
  w2: 1.0
  w3: 1.6
  LARGER: 1.4
  EXEMPLAR_SIZE: 127
  INSTANCE_SIZE: 287    # FIXED: must match SEARCH_SIZE (287) for correct score_size=11
  BASE_SIZE: 8
  STRIDE: 8
  CONTEXT_AMOUNT: 0.5
  LOST_INSTANCE_SIZE: 831
  CONFIDENCE_LOW: 0.85
  CONFIDENCE_HIGH: 0.998
  MASK_THERSHOLD: 0.30
  MASK_OUTPUT_SIZE: 127