META_ARC: "HiFT_alexnet_aic4"
CUDA: True
# ======================================================================
# AIC-4 Fine-Tuning Config — COLLAPSE-HARDENED VERSION v2
#
# ROOT CAUSE OF COLLAPSE (epochs 3→4) — CONFIRMED FROM TRAINING LOG:
#   The training log shows AUC: 0.641→0.624→0.624→0.290 (epoch 4 collapse).
#   Two compounding causes:
#
#   (a) LOC_WEIGHT freeze was only 3 epochs — the same duration as the LR
#       warmup. So loc_weight=0.05 turned on at EXACTLY peak LR (epoch 4).
#       Worst possible timing: maximum LR × sudden regression gradient.
#
#   (b) GRAD_CLIP was 1.0. The log shows pre-clip gnorm=4.02 at epoch 1,
#       meaning gradients were being suppressed by 4× on every step.
#       When loc_weight arrived, the loc gradient (from randomly-initialized
#       head) was not suppressed proportionally to the cls gradient, causing
#       an imbalanced update that corrupted the cls head's learned features.
#
#   (c) The loc head (convloc) used default Kaiming init, producing large
#       regression outputs (far from zero). With IOULoss, IoU≈0 everywhere
#       → loss≈1.0 per cell. Even at loc_weight=0.05, this created a
#       significant gradient through layer4/layer5 backbone.
#
# KEY CHANGES IN v2 (train.py handles most; YAML documents the intent):
#
# 1. LOC_WEIGHT_FREEZE: 3→5 epochs (in train.py LOC_WEIGHT_FREEZE_EP=5)
#    The LR warmup ends at epoch 3. With freeze=5, loc_weight doesn't start
#    until epoch 6, when the cosine schedule has already begun descending.
#    This gives 2 extra epochs of "safe" cls-only training at peak LR.
#
# 2. GRAD_CLIP: 1.0→5.0 (in train.py GRAD_CLIP_GLOBAL=5.0)
#    The pre-clip gnorm in the log was 4.02, so 1.0 was suppressing all
#    gradients by 4×. A clip of 5.0 allows natural gradient flow while
#    still protecting against true spikes (gnorm > 5 would indicate a
#    genuine instability worth clipping).
#
# 3. Backbone LR shielding during loc transition (in train.py):
#    For 3 epochs after loc_weight turns on, the backbone LR is further
#    reduced to 10% of its normal value. This insulates layer4/layer5
#    from the noisy regression gradients while the loc head warm-starts.
#
# 4. Zero-init of convloc final layer (in utile.py HiFT.__init__):
#    The last Conv2d of the loc head is initialized with zero weights.
#    At the start of training, loc predictions ≈ 0, meaning decoded
#    offsets ≈ 0 → IoU loss starts at a reasonable value rather than 1.0.
#
# 5. cls2 bias init: sigmoid output starts near 0.01 instead of 0.5,
#    reducing false-positive BCE loss at the beginning of training.
#
# UNCHANGED from v1:
# - LOC_WEIGHT = 0.35 (final target, slow-ramped from 0.05 over 70% of
#   remaining epochs after the freeze period)
# - EPOCH = 50, BATCH_SIZE = 4, BASE_LR = 0.0001
# - BACKBONE.TRAIN_LAYERS = ['layer4', 'layer5']
# - All dataset and augmentation settings
# ======================================================================
TRAIN:
  THR_HIGH: 0.6
  THR_LOW: 0.3
  NEG_NUM: 16
  POS_NUM: 16
  TOTAL_NUM: 64
  CLS_WEIGHT: 1.0
  LOC_WEIGHT: 0.10          # Final target loc weight (ramped slowly in train.py)
  SHAPE_WEIGHT: 2.0
  EXEMPLAR_SIZE: 127
  SEARCH_SIZE: 287
  OUTPUT_SIZE: 11
  OUTPUTFEATURE_SIZE: 11
  LABEL_RANGE: 4
  BASE_SIZE: 8
  RESUME: ''
  PRETRAINED: 1
  LARGER: 2.0
  LOG_DIR: './logs'
  SNAPSHOT_DIR: './snapshot'
  EPOCH: 50
  START_EPOCH: 0
  BATCH_SIZE: 4
  NUM_GPU: 1
  NUM_WORKERS: 2
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.0005
  BASE_LR: 0.0001
  LR:
    TYPE: 'cosine'
    KWARGS:
      start_lr: 0.0001
      end_lr: 0.00001
  LR_WARMUP:
    WARMUP: True
    TYPE: 'linear'
    EPOCH: 3                 # LR warmup epochs (loc freeze = 5 > warmup = 3)
  PRINT_FREQ: 20
  GRAD_CLIP: 5.0             # FIX: raised from 1.0. Pre-clip gnorm was 4.0 → 1.0 was too aggressive
  w1: 1.0
  w2: 1.0
  w3: 1.0
  w4: 1.0
  w5: 1.0
  range: 2.0
  MASK_WEIGHT: 1
  LOG_GRADS: False
  clsandlocchannel: 256
  groupchannel: 32
  PR: 1

DATASET:
  NAMES: ['AIC4']
  NEG: 0.2
  GRAY: 0.05
  VIDEOS_PER_EPOCH: 800
  TEMPLATE:
    SHIFT: 4
    SCALE: 0.05
    BLUR: 0.1
    FLIP: 0.0
    COLOR: 1.0
  SEARCH:
    SHIFT: 32
    SCALE: 0.12
    BLUR: 0.15
    FLIP: 0.2
    COLOR: 1.0
  AIC4:
    ROOT: 'data/processed/crop511'
    ANNO: 'data/processed/train.json'
    FRAME_RANGE: 30
    NUM_USE: -1

BACKBONE:
  TYPE: 'alexnet'
  PRETRAINED: 'pretrained/first.pth'
  TRAIN_LAYERS: ['layer4', 'layer5']
  LAYERS_LR: 0.05
  TRAIN_EPOCH: 999

ANCHOR:
  STRIDE: 16

TRACK:
  TYPE: 'HiFTtracker'
  PENALTY_K: 0.04
  WINDOW_INFLUENCE: 0.44
  LR: 0.33
  w1: 1.2
  w2: 1.0
  w3: 1.6
  LARGER: 1.4
  EXEMPLAR_SIZE: 127
  INSTANCE_SIZE: 287
  BASE_SIZE: 8
  STRIDE: 8
  CONTEXT_AMOUNT: 0.5
  LOST_INSTANCE_SIZE: 831
  CONFIDENCE_LOW: 0.85
  CONFIDENCE_HIGH: 0.998
  MASK_THERSHOLD: 0.30
  MASK_OUTPUT_SIZE: 127
  SCORE_FUSION: 'weighted'
  SCORE_WEIGHTS: [0.7, 0.3]